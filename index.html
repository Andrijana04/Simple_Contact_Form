<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="container">

    <form id="contactForm" method="get">
        <h2>Contact us</h2>
        <p>We'd love to hear from you,please drop us a line if you've any query.</p>
<fieldset>

       <label for="first-name"> First Name
    <input type="text" placeholder="Enter your name" id="first-name">
       </label>

    <label for="last-name"> Last Name
        <input type="text" placeholder="Enter your last name" id="last-name">
    </label>
    <label for="email">Email Address
    <input type="text" id="email" placeholder="emaxple@email.com"></label>
    <label for="message">Message
    <textarea id="message" placeholder="Your message"></textarea>
    </label>
    <button type="submit">Submit</button>

</fieldset>
        <p id="error"></p>
    </form>
</div>
<script src="script.js"></script>
</body>
</html>
